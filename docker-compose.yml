services:

  backend:
    build: ./backend
    container_name: lads_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: lads_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: lads_postgres
    restart: always
    environment:
      POSTGRES_DB: lads
      POSTGRES_USER: lads
      POSTGRES_PASSWORD: lads
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: lads_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: